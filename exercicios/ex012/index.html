<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>ESte vídeo está hospedado no meu próprio servidor.</p>

    <video width="500px" poster="imagens/limoes-capa.png" controls>
        <source src="midia/meu-video.webm" type="video/webm">
    </video>


    <h1>Inserindo videos do Youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/i7L19SOqbNM?si=5VtxWtgZdVITbTwP" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <!--Usar o Vimeo é mais profissional-->
    <!--Mais barato pro cliente-->
</body>
</html>
